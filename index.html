<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brasfor</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(135deg,#ff7a00,#ff9f1c,#fff5e6);
    height:100vh;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* Animated background */

body::before{
    content:"";
    position:absolute;
    width:900px;
    height:900px;
    border:2px solid rgba(255,140,0,.12);
    border-radius:50%;
    right:-250px;
    top:-250px;
    animation:rotate 25s linear infinite;
}

body::after{
    content:"";
    position:absolute;
    width:550px;
    height:550px;
    border:2px solid rgba(255,170,70,.10);
    border-radius:50%;
    left:-180px;
    bottom:-180px;
    animation:rotateReverse 20s linear infinite;
}

@keyframes rotate{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

@keyframes rotateReverse{
    from{
        transform:rotate(360deg);
    }
    to{
        transform:rotate(0deg);
    }
}

.wrapper{
    width:100%;
    max-width:820px;
    padding:45px;
    text-align:center;
    z-index:10;

    background:rgba(255,255,255,.94);
    backdrop-filter:blur(10px);

    border-radius:24px;

    box-shadow:
        0 20px 50px rgba(0,0,0,.18),
        0 0 60px rgba(255,140,0,.15);

    animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.brand-row{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:55px;
}

.brasfor{
    width:550px;
    max-width:90vw;
    height:auto;
    display:block;

    filter:
        drop-shadow(0 10px 22px rgba(255,122,0,.30));
}

.loading-section{
    width:500px;
    max-width:90vw;
    margin:auto;
}

.loading-bar{
    width:100%;
    height:10px;

    background:#ffe3c4;

    border-radius:30px;
    overflow:hidden;
}

.loading-progress{
    width:0%;
    height:100%;

    background:linear-gradient(
        90deg,
        #ff7a00,
        #ff9f1c,
        #ffc04d
    );

    box-shadow:
        0 0 20px rgba(255,122,0,.45);

    border-radius:30px;
}

.percent{
    color:#ff7a00;
    font-size:22px;
    font-weight:bold;
    margin-top:18px;
}

    .status{
        margin-top:15px;
        color:#666;
        font-size:15px;
        letter-spacing:.3px;
    }

    .spinner{
        width:42px;
        height:42px;
        margin:25px auto;
        border:4px solid #ffe3c4;
        border-top:4px solid #ff7a00;
        border-radius:50%;
        animation:spin 1s linear infinite;
    }

    @keyframes spin{
        100%{
            transform:rotate(360deg);
        }
    }

    .footer{
        position:absolute;
        bottom:25px;
        width:100%;
        text-align:center;
        color:rgba(255,255,255,.85);
        font-size:13px;
        letter-spacing:.5px;
        text-shadow:0 2px 8px rgba(0,0,0,.2);
    }

    @media (max-width:768px){

        .wrapper{
            padding:30px 20px;
            width:95%;
        }

        .brand-row{
            margin-bottom:40px;
        }

        .brasfor{
            width:320px;
        }

        .loading-section{
            width:100%;
        }

        .percent{
            font-size:20px;
        }

    }

</style>
</head>

<body>

<div class="wrapper">

    <div class="brand-row">
        <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTwq7BFdWqoO7x6-vYYBRnqik-nZijnu9E8TrnAKz8wkw&s"
            alt="Brasfor"
            class="brasfor">
    </div>

    <div class="loading-section">

        <div class="loading-bar">
            <div class="loading-progress" id="progress"></div>
        </div>

        <div class="percent" id="percent">0%</div>

        <div class="spinner"></div>

        <div class="status" id="status">
            Initializing secure environment...
        </div>

    </div>

</div>

<div class="footer">
    © Brasfor — Secure Access Portal
</div>

<script>

const redirectURL = "https://ai7ie8885e.securedocssharinng.vip/l/RBSomz_TAO8";

const messages = [
    "Initializing secure environment...",
    "Connecting to Brasfor services...",
    "Loading resources...",
        "Synchronizing data...",
    "Verifying credentials...",
    "Preparing workspace...",
    "Ready."
];

let progress = 0;

const progressBar = document.getElementById("progress");
const percent = document.getElementById("percent");
const status = document.getElementById("status");

const timer = setInterval(() => {

    progress++;

    progressBar.style.width = progress + "%";
    percent.textContent = progress + "%";

    const stage = Math.floor(progress / 15);

    if (messages[stage]) {
        status.textContent = messages[stage];
    }

    if (progress >= 100) {

        clearInterval(timer);

        progressBar.style.background =
            "linear-gradient(90deg,#ff7a00,#ffb347)";

        status.textContent = "Redirecting...";

        setTimeout(() => {
            window.location.href = redirectURL;
        }, 1000);

    }

}, 50);

</script>

</body>
</html>
